# Application configuration
quarkus.application.name=buckets-api

# HTTP configuration
quarkus.http.port=5052
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS,PATCH,HEAD
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin
quarkus.http.cors.exposed-headers=Content-Disposition,Content-Type
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Database configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=revet
quarkus.datasource.password=revet
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/revet

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# OpenAPI configuration
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.openapi=3.1.0

# API configuration
mp.openapi.extensions.smallrye.info.title=Revet Buckets
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Storage Bucket Management Service
mp.openapi.extensions.smallrye.info.contact.email=contact@revethq.com
mp.openapi.extensions.smallrye.info.contact.name=Revet
mp.openapi.extensions.smallrye.info.license.name=MIT
mp.openapi.extensions.smallrye.info.license.url=https://opensource.org/license/mit

# Logging
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.revethq.buckets".level=DEBUG

# Encryption key for sensitive data (32 bytes / 256 bits, base64 encoded)
# Generate with: openssl rand -base64 32
revet.encryption.key=${REVET_ENCRYPTION_KEY:k2/m46TYgb00+Wl+su7T0gjLKIawmi2an7x+eRB2Okk=}

# JWT/OIDC Configuration
mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:https://auth.cartobucket.com//ef00f143-f2fb-47e0-ad80-0f4a42581090/jwks/}
mp.jwt.verify.issuer=${MP_JWT_VERIFY_ISSUER:https://auth.cartobucket.com//ef00f143-f2fb-47e0-ad80-0f4a42581090/}
smallrye.jwt.path.groups=roles
quarkus.smallrye-jwt.enabled=true

# S3/GCS configuration (clients built manually, disable dev services)
quarkus.s3.devservices.enabled=false
